<!DOCTYPE html>
<html lang="pt-br" xmlns="w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"><!--Tags que fazem
    referência ao thymeleaf e o xhtml-->

<head th:insert="~{Head.html}"> <!--Cá estamos aproveitando código para não ter que mexer em todas as
    vistas, apenas uma já facilita a manutenção do código-->
</head>

<!--Inserindo fragmentos de código para reutilizar em outros projetos, nesse caso uma barra de navegação
No fragmento está a parte :: nav, aquilo quer dizer que o nome do fragmento vai ser nav-->
<header th:insert="~{Navbar.html :: nav}"></header>

<body>
    
<!--Cuidar para que o que está entre ${} seja o nome passado no objeto Model que vai em forma de 
chave : valor , pois não tem a ver como está instanciado o objeto e sim a nome no model.-->

    <div class="formMercados mx-md-3 mx-sm-1">

        <h1 class="text-primary">Página de cadastro de Mercado</h1>
    
        <p>Bem-vindo, cá pode fazer o cadastro dos mercados no banco de dados</p>

        <form th:action="@{/mercados/cadastroMercados}" method="POST" th:object="${MercadoFormularioDTO}"><!--O th:object nos diz o tipo de objeto que está sendo passado no POST-->
            <div class="cadastro-mercado">
                <div class="form-group">
                    <label for="id">Id: </label>
                    <input type="hidden" id="id" th:field="${MercadoForm.MercadoId}" /><!--Fica como hidden para evitar inserir um id que já é gerenciado pelo banco de dados, mas necessário quando há atualização num registro-->
                </div>
                
                <div class="form-group col-12 col-sm-6">
                    <label for="bairro">Bairro: </label> 
                    <input type="text" id="bairro" class="form-control" th:field="${MercadoForm.bairro}" required/>
                </div>
                
                <div class="form-group col-12 col-sm-6">
                    <label for="endereco">Endereço: </label> 
                    <input type="text" id="endereco" class="form-control" th:field="${MercadoForm.endereco}" required/>
                </div>
                
                
                <div class="form-group col-12 col-sm-6">
                    <label for="numero">Número: </label> 
                    <input type="text" id="numero" class="form-control" th:field="${MercadoForm.numero}" required/>
                </div>
                
                <div class="form-group col-12 col-sm-6 mb-2">
                    <label for="cep">CEP: </label> 
                    <input type="text" id="cep" class="form-control" aria-describedby="Cep" th:field="${MercadoForm.cep}" required/>
                    <small id="Cep" class="text-form text-muted"> Insira o CEP no formato 00000-000</small>
                </div>
                
                <div class="form-group col-12 col-sm-6">
                    <label for="cidade">Cidade: </label> 
                    <input type="text" id="cidade" class="form-control" th:field="${MercadoForm.cidade}" required/>
                </div>
                
                <div class="form-group col-12 col-sm-6 mb-2">
                    <label for="telefone">Telefone: </label> 
                    <input type="text" id="telefone" class="form-control" aria-describedby="tel" th:field="${MercadoForm.telefone}" required/>
                    <small id="tel" class="text-form text-muted" > Escreva o DDD-telefone</small>
                </div>
                
                <div class="form-group col-12 col-sm-6">
                    <label for="site">Página web: </label> 
                    <input type="text" id="site" class="form-control" th:field="${MercadoForm.site}" required/>
                </div>
                
                <div class="form-group col-12 col-sm-6 mb-2">
                    <label for="teleEntrega">Tele-entrega?: </label> 
                    <input type="text" id="teleEntrega" class="form-control" aria-describedby="tele" th:field="${MercadoForm.teleEntrega}" required/>
                    <small id="tele" class="text-form text-muted" > Escreva S para Sim e N para Não</small>
                </div>
                
                <div class="form-group col-12 col-sm-6">
                    <label for="uf">UF/Estado/Dpto:  </label> 
                    <input type="text" id="uf" class="form-control" th:field="${MercadoForm.uf}" required/>
                </div>

                <h3 class="text-secondary my-2">Seleção da Red de Mercados</h3>

                <div class="col-12 col-sm-6">
                    <label for="red"> Selecione uma red de mercados </label> 
                    <!-- Caixa de seleção da red de mercados -->
                     <select class="form-select" name="redId" id="red" required> <!-- Muito importante: o name no html deve coincidir com o atributo no DTO -->
                            <option value="">-- Selecione--</option>
                            <option th:each="red : ${Redes}"
                                    th:value = "${red.id}" 
                                    th:text = "${red.nomeRed}"> <!-- Atenção: Pega o id com o value e passa o nome da red do mercado com text -->
                            </option>

                     </select>

                    <div class="mb-3">
                    <!-- Link de redirecionamento caso seja necessário criar a rede por não estar na lista -->
                    <a class="link-primary" th:href="@{/mercados/cadastroMercados/red}">Cadastro Red de Mercados</a>
                    </div>
                </div>

            </div>    
                
            <div class="botoes-cadastro">
                <button type="submit" class="btn btn-success"> Cadastrar Mercado </button>
            </div>
            
        </form>

    </div>

</body>
</html>
