<!DOCTYPE html>
<html lang="pt-br" xmlns="w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"><!--Tags que fazem
    referência ao thymeleaf e o xhtml-->

<head th:insert="~{Head.html}"> <!--Cá estamos aproveitando código para não ter que mexer em todas as
    vistas, apenas uma já facilita a manutenção do código-->
</head>

<!--Inserindo fragmentos de código para reutilizar em outros projetos, nesse caso uma barra de navegação
No fragmento está a parte :: nav, aquilo quer dizer que o nome do fragmento vai ser nav-->
<header th:insert="~{Navbar.html :: nav}"></header>

<body>
    <h1>Página de cadastro de Produto</h1>
    
    <p>Bem-vindo, cá pode fazer o cadastro dos produtos no banco de dados</p>
    
<!--Cuidar para que o que está entre ${} seja o nome passado no objeto Model que vai em forma de 
chave : valor , pois não tem a ver como está instanciado o objeto e sim a nome no model.-->

    <div class="formProdutos">

        <form th:action="@{/produtos/cadastroProdutos}" method="POST" th:object="${ProdutoFormularioDTO}"><!--O th:object nos diz o tipo de objeto que está sendo passado no POST, neeste caso é o ProdutoFormularioDTO que contém as informações compiladas das 3 entidades envolvidas no formulário (Produto, Mercado, ProdutoMercado). Aliás o Thymeleaf só aceita um objeto no formulário e por causa disso foi necessário criar o DTO-->
            <div class="cadastro-produto">

                <h3>Produto</h3>

                <p>
                    <label for="id">Id: </label>
                    <input type="hidden" th:field="${ProdutoForm.produtoId}" /><!--Fica como hidden para evitar inserir um id que já é gerenciado pelo banco de dados, mas necessário quando há atualização num registro-->
                </p>
                
                <p>
                    <label for="nome">Produto: </label> 
                    <input type="text" th:field="${ProdutoForm.nome}" required/>
                </p>
                
                <p>
                    <label for="tipo">Tipo: </label> 
                    <input type="text" th:field="${ProdutoForm.tipo}" required/>
                </p>
                
                
                <p>
                    <label for="categoria">Categoria: </label> 
                    <input type="text" th:field="${ProdutoForm.categoria}" required/>
                </p>
                
                <p>
                    <label for="marca">Marca: </label> 
                    <input type="text" th:field="${ProdutoForm.marca}" required/>
                </p>
                
                <p>
                    <label for="udMedida">Unidade de medida: </label> 
                    <input type="text" th:field="${ProdutoForm.udMedida}" required/>
                </p>
                
                <p>
                    <label for="quantidade_conteudo">Qtd de produto: </label> 
                    <input type="number" step="0.01"  th:field="${ProdutoForm.quantidadeConteudo}" required/>
                </p>
                
                <p>
                    <label for="status">Status do produto: </label> 
                    <input type="checkbox" th:field="${ProdutoForm.status}" required/>
                </p>


                <h3>Seleção do Mercado</h3>

                <p>
                    <label for="mercado"> Selecione um mercado </label> 
                    <!-- Caixa de seleção do mercado -->
                     <select name="mercadoId" id="mercado" required> <!-- Muito importante: o name no html deve coincidir com o atributo no DTO -->
                            <option value="">-- Selecione--</option>
                            <!-- Cá no value utilizo id ao invés de mercadoId, pois mercado é um MercadoEntity, já o name do select tem mercadoId que é como está no DTO -->
                            <option th:each="mercado : ${Mercados}"
                                    th:value = "${mercado.id}"  
                                    th:text ="${mercado.mostrarMercadoRed}"> <!-- Atenção: Cá executo o método de MercadoEntity para enviar o nome correto -->
                            </option>

                     </select>

                     <!-- Link de redirecionamento caso seja necessário cadastrar um mercado por não estar na lista -->
                     <a th:href="@{/mercados/cadastroMercados}">Cadastro de Mercados</a>

                </p>

                
                <h3>Informações do produto no mercado</h3>

                <p>
                    <label for="preco">Preço: </label> 
                    <input type="number" step="0.01"  th:field="${ProdutoForm.preco}" required/>
                </p>
                
                <p>
                    <label for="moeda">Moeda: </label> 
                    <input type="text" th:field="${ProdutoForm.moeda}" required/>
                </p>
                
                <p>
                    <label for="dataPreco">Data do preço: </label> 
                    <input type="date" th:field="${ProdutoForm.dataPreco}" required/>
                </p>
                
                <p>
                    <label for="dataValidade">Data de validade: </label> 
                    <input type="date" th:field="${ProdutoForm.dataValidade}" required/>
                </p>
                

            </div>    
                
            <div class="botoes-cadastro">
                <button type="submit"> Cadastrar </button>
            </div>
            
        </form>

    </div>

</body>
</html>
