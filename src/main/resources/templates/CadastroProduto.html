<!DOCTYPE html>
<html lang="pt-br" xmlns="w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"><!--Tags que fazem
    referência ao thymeleaf e o xhtml-->

<head th:insert="~{Head.html}"> <!--Cá estamos aproveitando código para não ter que mexer em todas as
    vistas, apenas uma já facilita a manutenção do código-->
</head>

<!--Inserindo fragmentos de código para reutilizar em outros projetos, nesse caso uma barra de navegação
No fragmento está a parte :: nav, aquilo quer dizer que o nome do fragmento vai ser nav-->
<header th:insert="~{Navbar.html :: nav}"></header>

<body>
    <h1>Página de cadastro de Produto</h1>
    
    <p>Bem-vindo, cá pode fazer o cadastro dos produtos no banco de dados</p>
    
<!--Cuidar para que o que está entre ${} seja o nome passado no objeto Model que vai em forma de 
chave : valor , pois não tem a ver como está instanciado o objeto e sim a nome no model.-->

    <div class="formProdutos">

        <form th:action="@{/produtos/cadastroProdutos}" method="POST" th:object="${ProdutoEntity}"><!--O th:object nos diz o tipo de objeto que está sendo passado no POST-->
            <div class="cadastro-produto">
                <p>
                    <label for="id">Id: </label>
                    <input type="hidden" th:field="${Produto.id}" /><!--Fica como hidden para evitar inserir um id que já é gerenciado pelo banco de dados, mas necessário quando há atualização num registro-->
                </p>
                
                <p>
                    <label for="nome">Produto: </label> 
                    <input type="text" th:field="${Produto.nome}" />
                </p>
                
                <p>
                    <label for="tipo">Tipo: </label> 
                    <input type="text" th:field="${Produto.tipo}" />
                </p>
                
                
                <p>
                    <label for="categoria">Categoria: </label> 
                    <input type="text" th:field="${Produto.categoria}" />
                </p>
                
                <p>
                    <label for="marca">Marca: </label> 
                    <input type="text" th:field="${Produto.marca}" />
                </p>
                
                <p>
                    <label for="ud_medida">Unidade de medida: </label> 
                    <input type="text" th:field="${Produto.ud_medida}" />
                </p>
                
                <p>
                    <label for="quantidade_conteudo">Qtd de produto: </label> 
                    <input type="number" step="0.01"  th:field="${Produto.quantidade_conteudo}" />
                </p>
                
                <p>
                    <label for="preco">Preço: </label> 
                    <input type="number" step="0.01"  th:field="${Produto.preco}" />
                </p>
                
                <p>
                    <label for="moeda">Moeda: </label> 
                    <input type="text" th:field="${Produto.moeda}" />
                </p>
                
                <p>
                    <label for="data_preco">Data do preço: </label> 
                    <input type="date" th:field="${Produto.data_preco}" />
                </p>
                
                <p>
                    <label for="data_validade">Data de validade: </label> 
                    <input type="date" th:field="${Produto.data_validade}" />
                </p>
                
                <p>
                    <label for="status">Status do produto: </label> 
                    <input type="checkbox" th:field="${Produto.status}" />
                </p>

            </div>    
                
            <div class="botoes-cadastro">
                <button type="submit"> Cadastrar </button>
            </div>
            
        </form>

    </div>

</body>
</html>
